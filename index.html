<!DOCTYPE html>
<html>
<head>
    <title>Album Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <h2 class="logo">Album Finder</h2>
    <a href="https://github.com/nehal216/album_finder" class="github-link">GitHub</a>
    </nav>

    <center>
        <section>
            <h1>DISCOVER YOUR SOUND</h1>

            <h2>
                Find albums from your favorite artists.
            </h2>

            <form id="search-form">
            <input id="artist-input" type="text" placeholder="Enter artist name">
            <button type="submit">Search</button>
            </form>

            <hr>
            
            <p id="message"></p>

            <div id="results"></div>

            <script src="app.js"></script>
        </section>

    </center>
</body>
</html>
